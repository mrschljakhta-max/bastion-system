<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BASTION SYSTEMS</title>

  <link rel="stylesheet" href="styles/bastion-wordmark.css">

  <style>
    body{
      margin:0;
      overflow:hidden;
      background:#050505;
      color:white;
      font-family:Arial,sans-serif;
    }

    .scene{
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at center, rgba(255,0,0,.16), transparent 35%),
        linear-gradient(to bottom,#040404,#140303 52%,#240000 100%);
    }

    .center-core{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
    }

    .ring{
      position:absolute;
      width:min(62vw,720px);
      height:min(62vw,720px);
      border-radius:50%;
      border:7px solid rgba(255,72,90,.48);
      border-top-color:transparent;
      border-bottom-color:transparent;
      animation:rotateRing 24s linear infinite;
      filter:
        blur(.2px)
        drop-shadow(0 0 24px rgba(255,50,70,.24));
    }

    @keyframes rotateRing{
      from{transform:rotate(0deg);}
      to{transform:rotate(360deg);}
    }

    .menu-item{
      position:absolute;
      text-align:center;
      font-family:'Rajdhani',sans-serif;
      z-index:5;
    }

    .menu-item h3{
      margin:0;
      font-size:42px;
      letter-spacing:.12em;
      font-weight:600;
    }

    .menu-item span{
      font-size:12px;
      letter-spacing:.45em;
      color:#ff5544;
      opacity:.82;
    }

    .menu-top{
      top:14%;
    }

    .menu-left{
      left:18%;
      bottom:24%;
    }

    .menu-right{
      right:18%;
      bottom:24%;
    }

    .hud-top-left,
    .hud-top-right,
    .hud-bottom-left,
    .hud-bottom-right{
      position:absolute;
      font-family:'Rajdhani',sans-serif;
      letter-spacing:.28em;
      font-size:14px;
      opacity:.82;
      z-index:6;
    }

    .hud-top-left{
      top:48px;
      left:54px;
    }

    .hud-top-right{
      top:48px;
      right:54px;
      text-align:right;
    }

    .hud-bottom-left{
      bottom:42px;
      left:54px;
    }

    .hud-bottom-right{
      bottom:42px;
      right:54px;
      text-align:right;
    }

  </style>
</head>
<body>

<div class="scene"></div>

<div class="hud-top-left">
  BASTION SYSTEMS<br>
  v.0.1.0
</div>

<div class="hud-top-right">
  SECURE CONNECTION<br>
  EST. 2026
</div>

<div class="hud-bottom-left">
  STATUS: STANDBY
</div>

<div class="hud-bottom-right">
  © 2026 BASTION SYSTEMS
</div>

<div class="center-core">

  <div class="ring"></div>

  <div class="menu-item menu-top">
    <h3>ВХІД</h3>
    <span>LOGIN</span>
  </div>

  <div class="menu-item menu-left">
    <h3>РОЗРОБНИК</h3>
    <span>DEVELOPER</span>
  </div>

  <div class="menu-item menu-right">
    <h3>РЕЄСТРАЦІЯ</h3>
    <span>REGISTER</span>
  </div>

  <div class="brand-wordmark-wrap">

    <img
      class="brand-logo"
      src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/React-icon.svg/512px-React-icon.svg.png"
      alt="Bastion Logo"
    >

    <div class="brand-name">
      BASTION
    </div>

    <div class="brand-subtitle">
      AUTHORIZED ACCESS NODE
    </div>

  </div>

</div>

</body>
</html>
