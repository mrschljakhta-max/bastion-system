<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BASTION SYSTEMS</title>

  <link rel="stylesheet" href="styles/fonts.css">
  <link rel="stylesheet" href="styles/logo.css">
  <link rel="stylesheet" href="styles/hud-ring.css">

  <style>
    body{
      margin:0;
      overflow:hidden;
      background:#050505;
      font-family:var(--font-ui);
      color:#fff;
    }

    .bg{
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at center, rgba(255,0,0,.18), transparent 40%),
        linear-gradient(to bottom,#050505,#120303 45%,#220000 100%);
    }

    .hud{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .core{
      position:relative;
      width:720px;
      height:720px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .center{
      position:absolute;
      text-align:center;
      z-index:5;
    }

    .wordmark{
      width:440px;
      margin-top:18px;
      filter:
        drop-shadow(0 0 18px rgba(255,120,0,.18))
        drop-shadow(0 0 45px rgba(255,0,0,.12));
      animation: logoPulse 6s ease-in-out infinite;
    }

    @keyframes logoPulse{
      0%,100%{transform:translateY(0px);}
      50%{transform:translateY(-4px);}
    }

    .subtitle{
      margin-top:14px;
      font-family:var(--font-ui);
      letter-spacing:.45em;
      color:#ff6969;
      font-size:12px;
      opacity:.8;
    }

    .sector{
      position:absolute;
      text-align:center;
      z-index:6;
    }

    .sector h3{
      margin:0;
      font-size:24px;
      letter-spacing:.12em;
      font-family:var(--font-ui);
    }

    .sector span{
      font-size:11px;
      letter-spacing:.4em;
      opacity:.6;
      color:#ff6a6a;
    }

    .top{ top:65px; }
    .left{ left:55px; bottom:170px; }
    .right{ right:55px; bottom:170px; }

  </style>
</head>
<body>

<div class="bg"></div>

<div class="hud">
  <div class="core">

    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>

    <div class="sector top">
      <h3>ВХІД</h3>
      <span>LOGIN</span>
    </div>

    <div class="sector left">
      <h3>РОЗРОБНИК</h3>
      <span>DEVELOPER</span>
    </div>

    <div class="sector right">
      <h3>РЕЄСТРАЦІЯ</h3>
      <span>REGISTER</span>
    </div>

    <div class="center">
      <img src="assets/logo/bastion-wordmark.svg" class="wordmark"/>
      <div class="subtitle">AUTHORIZED ACCESS NODE</div>
    </div>

  </div>
</div>

</body>
</html>
