<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>BASTION — CORE SYSTEM</title>

  <link rel="icon" type="image/svg+xml" href="../assets/logo/bastion-favicon.svg?v=66" />
  <link rel="shortcut icon" href="../assets/logo/bastion-favicon.svg?v=66" />
  <link rel="stylesheet" href="../styles/app-home-v66.css?v=66" />
</head>

<body class="bastion-core-page">
  <div class="core-background" aria-hidden="true">
    <div class="core-bg-image"></div>

    <svg class="beam-layer" viewBox="0 0 1920 1080" preserveAspectRatio="none">
      <path class="beam beam-left" d="M0 520 H355 L470 475 H690 L810 520 H930" />
      <path class="beam beam-right" d="M1920 520 H1565 L1450 475 H1230 L1110 520 H990" />
      <path class="beam beam-top-left" d="M0 292 H300 L420 220 H650 L780 342 H915" />
      <path class="beam beam-top-right" d="M1920 292 H1620 L1500 220 H1270 L1140 342 H1005" />
      <path class="beam beam-bottom-left" d="M0 792 H295 L420 860 H650 L780 728 H915" />
      <path class="beam beam-bottom-right" d="M1920 792 H1625 L1500 860 H1270 L1140 728 H1005" />
    </svg>

    <canvas id="particlesCanvas" class="particles-canvas"></canvas>
    <div class="scanlines"></div>
  </div>

  <header class="top-hud">
    <button class="assistant-card" id="orbiButton" type="button">
      <span class="avatar-orbi">
        <img src="../assets/icons/orbital/orbi.svg?v=65" alt="" />
      </span>
      <span class="hud-copy">
        <strong>ORBI</strong>
        <small>AI ASSISTANT</small>
      </span>
    </button>

    <button class="user-card" id="userMenuButton" type="button" aria-haspopup="dialog" aria-controls="profileModal">
      <span class="avatar-user">
        <img src="../assets/icons/orbital/user.svg?v=65" alt="" />
      </span>
      <span class="hud-copy user-copy">
        <strong id="operatorName">Користувач</strong>
        <small>Рівень доступу: <b id="operatorRole">DEMO</b></small>
      </span>
      <span class="user-arrow">⌄</span>
    </button>
  </header>

  <main class="core-screen" aria-label="BASTION main orbital menu">
    <section class="orbital-menu" aria-label="Головне меню системи">
      <img class="mechanical-ring-underlay" src="../assets/backgrounds/app-ring-base-v63.png?v=66" alt="" aria-hidden="true" />
      <div class="reactor-status" aria-hidden="true"><span>CORE</span><b>ONLINE</b></div>
      <svg class="orbital-svg" viewBox="0 0 1000 1000" role="img" aria-label="Секторне меню BASTION">
        <defs>
          <filter id="redGlow" x="-45%" y="-45%" width="190%" height="190%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>

          <linearGradient id="segmentFill" x1="0" x2="1">
            <stop offset="0%" stop-color="#23272d" stop-opacity=".94" />
            <stop offset="42%" stop-color="#101217" stop-opacity=".90" />
            <stop offset="100%" stop-color="#050608" stop-opacity=".96" />
          </linearGradient>

          <radialGradient id="sectorHotCore" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ff6a3d" stop-opacity=".35" />
            <stop offset="42%" stop-color="#ff3338" stop-opacity=".16" />
            <stop offset="100%" stop-color="#ff3338" stop-opacity="0" />
          </radialGradient>

          <linearGradient id="metalSheen" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffffff" stop-opacity=".16" />
            <stop offset="28%" stop-color="#ffffff" stop-opacity=".035" />
            <stop offset="58%" stop-color="#000000" stop-opacity=".22" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity=".07" />
          </linearGradient>

          <filter id="hotGlow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.9  0 0.18 0 0 0.05  0 0 0.18 0 0.04  0 0 0 .9 0" result="redblur" />
            <feMerge>
              <feMergeNode in="redblur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <g class="rotating-rings">
          <circle cx="500" cy="500" r="458"></circle>
          <circle cx="500" cy="500" r="422"></circle>
          <circle cx="500" cy="500" r="372"></circle>
        </g>

        <g id="energyBeams" class="sector-beams"></g>

        <g id="sectorPaths"></g>

        <g class="core-rings">
          <circle cx="500" cy="500" r="178"></circle>
          <circle cx="500" cy="500" r="142"></circle>
          <circle cx="500" cy="500" r="108"></circle>
        </g>
      </svg>

      <div class="module-labels" id="moduleLabels"></div>
      <div class="floating-detail" id="floatingDetail"></div>

      <a class="core-node" href="./app.html" aria-label="BASTION CORE">
        <span class="core-node-shell" aria-hidden="true">
          <img class="center-reactor-ring" src="../assets/backgrounds/app-center-reactor-v66.png?v=66" alt="" />
          <span class="center-reactor-glow"></span>
          <img class="center-bastion-mark" src="../assets/icons/bastion-mark-v66.png?v=66" alt="" />
        </span>
      </a>
    </section>
  </main>

  <footer class="bottom-contact">
    <a href="mailto:support@bastion.system">✉ support@bastion.system</a>
    <span>•</span>
    <a href="https://t.me/bastion_support">⌁ @bastion_support</a>
    <span>•</span>
    <a href="tel:+380970000000">☏ +38 (097) 000-00-00</a>
  </footer>

  <nav class="bottom-map" aria-label="Карта сайту">
    <span>SITE MAP</span>
    <button class="map-dot is-active" data-target="core" title="BASTION Core"></button>
    <button class="map-dot" data-target="dicts" title="Довідники"></button>
    <button class="map-dot" data-target="upload" title="Завантаження"></button>
    <button class="map-dot" data-target="nodes" title="Зв’язки / Вузли"></button>
    <button class="map-dot" data-target="calculator" title="Калькулятор"></button>
    <button class="map-dot" data-target="analysis" title="Аналіз"></button>
    <button class="map-dot" data-target="command" title="Висновки"></button>
  </nav>

  <div class="profile-modal" id="profileModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="profileTitle">
    <div class="profile-backdrop" data-close-profile></div>
    <section class="profile-card">
      <button class="profile-close" type="button" data-close-profile aria-label="Закрити">×</button>

      <div class="profile-head">
        <span class="profile-avatar">
          <img src="../assets/icons/orbital/user.svg?v=65" alt="" />
        </span>
        <div>
          <p>USER NODE</p>
          <h2 id="profileTitle">Профіль користувача</h2>
        </div>
      </div>

      <dl class="profile-data">
        <div><dt>Логін</dt><dd id="profileLogin">—</dd></div>
        <div><dt>Email</dt><dd id="profileEmail">—</dd></div>
        <div><dt>Рівень доступу</dt><dd id="profileRole">—</dd></div>
        <div><dt>Статус</dt><dd>ACTIVE / MFA VERIFIED</dd></div>
      </dl>

      <div class="profile-actions">
        <button type="button" class="ghost-btn">Редагувати аватар</button>
        <button type="button" class="danger-btn" id="logoutButton">Вийти з системи</button>
      </div>
    </section>
  </div>

  <script src="../scripts/config.js?v=66"></script>
  <script src="../scripts/auth.js?v=66"></script>
  <script src="../scripts/app-home.js?v=66"></script>
</body>
</html>
