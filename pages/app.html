<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTION</title>
  <link rel="stylesheet" href="../styles/app.css">
  <link rel="icon" type="image/png" href="../assets/favicon.png">
</head>

<body>

<div class="app-bg"></div>

<div class="hud-wrapper">

  <div class="core-ring">

    <div class="sector sector-01">
      <div class="sector-number">01</div>
      <div class="sector-label">ДОВІДНИКИ</div>
    </div>

    <div class="sector sector-02">
      <div class="sector-number">02</div>
      <div class="sector-label">ЗВ'ЯЗКИ</div>
    </div>

    <div class="sector sector-03 sector-bottom">
      <div class="sector-label">ЗАВАНТАЖЕННЯ</div>
      <div class="sector-number">03</div>
    </div>

    <div class="sector sector-04 sector-bottom">
      <div class="sector-label">КАЛЬКУЛЯТОР</div>
      <div class="sector-number">04</div>
    </div>

    <div class="sector sector-05">
      <div class="sector-number">05</div>
      <div class="sector-label">АНАЛІЗ</div>
    </div>

    <div class="sector sector-06">
      <div class="sector-number">06</div>
      <div class="sector-label">ВИСНОВКИ</div>
    </div>

    <div class="core-center">
      <img src="../assets/logo-core.png" class="core-logo">
    </div>

  </div>

</div>

</html>
