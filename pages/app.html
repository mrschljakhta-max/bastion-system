<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BASTION — Core</title>
  <link rel="stylesheet" href="../styles/app-home-v78.css?v=78" />
</head>
<body class="bastion-core-page" data-active-module="">
  <div class="core-background" aria-hidden="true">
    <div class="core-bg-image"></div>
    <svg class="circuit-traces" viewBox="0 0 1600 900" preserveAspectRatio="none">
      <defs>
        <linearGradient id="traceRed" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="rgba(255,40,32,0)" />
          <stop offset=".5" stop-color="rgba(255,95,70,.95)" />
          <stop offset="1" stop-color="rgba(255,40,32,0)" />
        </linearGradient>
      </defs>
      <g class="trace-base">
        <path d="M0 235 H250 L310 190 H520"/><path d="M1600 235 H1348 L1290 190 H1080"/>
        <path d="M0 500 H290 L360 454 H620"/><path d="M1600 500 H1300 L1232 454 H980"/>
        <path d="M0 672 H360 L420 718 H680"/><path d="M1600 672 H1240 L1180 718 H920"/>
      </g>
      <g class="trace-pulse">
        <path style="--d:.2s" d="M0 235 H250 L310 190 H520"/><path style="--d:1.1s" d="M1600 235 H1348 L1290 190 H1080"/>
        <path style="--d:2.0s" d="M0 500 H290 L360 454 H620"/><path style="--d:2.9s" d="M1600 500 H1300 L1232 454 H980"/>
        <path style="--d:3.7s" d="M0 672 H360 L420 718 H680"/><path style="--d:4.5s" d="M1600 672 H1240 L1180 718 H920"/>
      </g>
      <g class="trace-nodes"><circle cx="250" cy="235" r="3"/><circle cx="1348" cy="235" r="3"/><circle cx="290" cy="500" r="3"/><circle cx="1300" cy="500" r="3"/><circle cx="360" cy="672" r="3"/><circle cx="1240" cy="672" r="3"/></g>
    </svg>
    <svg class="beam-layer" viewBox="0 0 1600 900" preserveAspectRatio="none" aria-hidden="true">
      <path class="beam" d="M0 305 C 390 300, 470 420, 800 450 C 1130 480, 1210 300, 1600 305" />
      <path class="beam" d="M0 610 C 380 540, 520 520, 800 450 C 1080 380, 1220 540, 1600 610" />
    </svg>
    <canvas id="particlesCanvas" class="particles-canvas"></canvas>
    <div class="scanlines"></div>
  </div>

  <header class="top-hud">
    <button class="assistant-card" type="button" aria-label="ORBI помічник">
      <span class="avatar-orbi"><img src="../assets/icons/bastion-mark-v66.png" alt="" /></span>
      <span class="hud-copy"><strong>ОРБІ</strong><small>ПОМІЧНИК</small></span>
    </button>

    <button id="userMenuButton" class="user-card" type="button" aria-haspopup="dialog" aria-expanded="false">
      <span class="user-copy"><strong id="operatorName">lavash.squad</strong><small>Рівень доступу: <b id="operatorRole">DEMO</b></small></span>
      <span class="user-arrow">⌄</span>
      <span class="avatar-user"><img id="userAvatarTop" src="../assets/icons/bastion-mark-v66.png" alt="" /></span>
    </button>
  </header>

  <main class="core-screen">
    <section class="orbital-menu" aria-label="Головне меню BASTION">
      <img class="mechanical-ring-underlay" src="../assets/backgrounds/app-ring-base-v63.png?v=63" alt="" />
      <div class="reactor-status">CORE <b>ONLINE</b></div>

      <svg class="orbital-svg" viewBox="0 0 1000 1000" aria-hidden="true">
        <defs>
          <radialGradient id="segmentFill" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="rgba(255,70,50,.05)" />
            <stop offset="78%" stop-color="rgba(20,20,24,.72)" />
            <stop offset="100%" stop-color="rgba(4,4,6,.92)" />
          </radialGradient>
          <radialGradient id="sectorHotCore" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="rgba(255,80,50,.32)" />
            <stop offset="100%" stop-color="rgba(255,20,10,0)" />
          </radialGradient>
          <linearGradient id="metalSheen" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="rgba(255,255,255,.08)" />
            <stop offset=".5" stop-color="rgba(255,61,42,.08)" />
            <stop offset="1" stop-color="rgba(0,0,0,.05)" />
          </linearGradient>
          <filter id="hotGlow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="redGlow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <g id="energyBeams" class="sector-beams"></g>
        <g id="sectorPaths"></g>
      </svg>

      <div id="moduleLabels" class="module-labels"></div>

      <a class="core-node" href="./app.html" aria-label="BASTION Core">
        <span class="core-node-shell">
          <img class="center-reactor-ring" src="../assets/backgrounds/app-center-reactor-v66.png?v=66" alt="" />
          <span class="center-reactor-glow"></span>
        </span>
        <img class="center-bastion-mark" src="../assets/icons/bastion-mark-v66.png?v=66" alt="BASTION" />
      </a>
    </section>
  </main>

  <footer class="bottom-contact">
    <a href="mailto:support@bastion.system">✉ support@bastion.system</a>
    <span class="contact-disabled">☎</span><span class="contact-disabled">◉</span><span class="contact-disabled">●</span>
  </footer>

  <nav class="bottom-map" aria-label="Site map">
    <span>SITE MAP</span>
    <button class="map-dot is-active" data-target="core" aria-label="Основне меню"></button>
    <button class="map-dot" data-target="dicts" aria-label="Довідники"></button>
    <button class="map-dot" data-target="upload" aria-label="Завантаження"></button>
    <button class="map-dot" data-target="nodes" aria-label="Зв’язки"></button>
    <button class="map-dot" data-target="calculator" aria-label="Калькулятор"></button>
    <button class="map-dot" data-target="analysis" aria-label="Аналіз"></button>
    <button class="map-dot" data-target="command" aria-label="Висновки"></button>
  </nav>

  <aside id="floatingDetail" class="floating-detail" aria-hidden="true"></aside>

  <div id="profileModal" class="profile-modal" aria-hidden="true">
    <div class="profile-backdrop" data-close-profile></div>
    <section class="profile-card" role="dialog" aria-modal="true" aria-label="Профіль користувача">
      <button class="profile-close" type="button" data-close-profile>×</button>
      <div class="profile-head">
        <span class="profile-avatar"><img id="userAvatarModal" src="../assets/icons/bastion-mark-v66.png" alt="" /></span>
        <div><p>USER PROFILE</p><h2 id="profileLogin">lavash.squad</h2></div>
      </div>
      <dl class="profile-data">
        <div><dt>Email</dt><dd id="profileEmail">support@bastion.system</dd></div>
        <div><dt>Рівень</dt><dd id="profileRole">demo</dd></div>
      </dl>
      <label class="profile-field">Nickname <input id="profileNicknameInput" type="text" maxlength="32" /></label>
      <label class="profile-field">Avatar <input id="profileAvatarInput" type="file" accept="image/png,image/jpeg,image/webp" /></label>
      <div class="profile-actions"><button id="saveProfileButton" class="ghost-btn" type="button">Зберегти</button><button id="logoutButton" class="danger-btn" type="button">Вийти</button></div>
    </section>
  </div>

  <script src="../scripts/app-home.js?v=78"></script>
</body>
</html>
