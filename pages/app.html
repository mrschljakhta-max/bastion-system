<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BASTION — System</title>
  <link rel="stylesheet" href="../styles/fonts.css" />
  <link rel="stylesheet" href="../styles/theme.css" />
  <link rel="stylesheet" href="../styles/base.css" />
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, rgba(132,8,24,.32), transparent 42%), #040406;
      color: #f4f7ff;
      font-family: var(--font-ui, system-ui, sans-serif);
      letter-spacing: .08em;
    }
    .panel {
      width: min(640px, 92vw);
      padding: 42px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 28px;
      background: rgba(0,0,0,.38);
      box-shadow: 0 0 60px rgba(255,46,77,.16);
      text-align: center;
    }
    .kicker { color: rgba(255,255,255,.55); text-transform: uppercase; letter-spacing: .26em; font-size: 12px; }
    h1 { text-transform: uppercase; letter-spacing: .12em; }
    .role { display: inline-block; margin: 14px 0; padding: 9px 13px; border: 1px solid rgba(255,46,77,.35); border-radius: 999px; color: #ffdce2; text-transform: uppercase; }
    a, button { color: #ff6f84; }
    button { margin-top: 18px; border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.05); padding: 12px 16px; border-radius: 14px; cursor: pointer; }
  </style>
</head>
<body>
  <section class="panel">
    <p class="kicker">BASTION SYSTEM</p>
    <h1>Кабінет користувача</h1>
    <div class="role" id="roleBadge">Перевірка доступу…</div>
    <p id="appText">Завантаження профілю доступу.</p>
    <button id="logoutBtn">Вийти</button>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../scripts/config.js?v=28"></script>
  <script src="../scripts/auth.js?v=28"></script>
  <script src="../scripts/access.js?v=1"></script>
  <script>
    (async function () {
      const roleBadge = document.getElementById('roleBadge');
      const appText = document.getElementById('appText');

      try {
        const session = await window.BastionAuth.getCurrentSession();
        if (!session) {
          window.location.href = '../index.html';
          return;
        }

        const profile = await window.BastionAccess.requireRole(['demo', 'user', 'supervisor'], '../index.html');
        if (!profile) return;

        roleBadge.textContent = `${profile.email} · ${profile.role}`;
        appText.textContent = profile.role === 'demo'
          ? 'Демо-доступ активний. Тут буде обмежений режим перегляду.'
          : profile.role === 'supervisor'
            ? 'Supervisor-доступ активний. Тут буде розширена панель контролю.'
            : 'User-доступ активний. Тут буде робочий кабінет користувача.';
      } catch (error) {
        console.error(error);
        roleBadge.textContent = 'Доступ не підтверджено';
        appText.textContent = 'Поверніться на стартову сторінку і виконайте вхід.';
      }

      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await window.BastionAuth.signOut();
        window.location.href = '../index.html';
      });
    })();
  </script>
</body>
</html>
