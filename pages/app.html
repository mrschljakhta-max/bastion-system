<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>BASTION — Tactical Orbital Interface</title>

  <link rel="icon" type="image/svg+xml" href="../assets/logo/bastion-favicon.svg?v=49" />
  <link rel="shortcut icon" href="../assets/logo/bastion-favicon.svg?v=49" />

  <link rel="stylesheet" href="../styles/app-home-v49.css?v=49" />
</head>

<body class="app-home-page">
  <div class="orbital-bg" aria-hidden="true">
    <div class="circuit-bg"></div>
    <svg class="circuit-flow" viewBox="0 0 1920 1080" preserveAspectRatio="none">
      <path d="M0 204 H310 L385 142 H620 L695 205 H960 L1042 142 H1302 L1372 205 H1920" />
      <path d="M0 412 H238 L322 336 H552 L644 414 H950 L1012 354 H1240 L1330 414 H1920" />
      <path d="M0 670 H270 L354 602 H590 L680 670 H975 L1060 602 H1310 L1395 670 H1920" />
      <path d="M0 884 H340 L410 820 H690 L760 884 H1025 L1110 824 H1400 L1485 884 H1920" />
      <path d="M220 0 V150 L305 232 V420 L225 510 V1080" />
      <path d="M1690 0 V160 L1600 248 V440 L1704 552 V1080" />
      <path d="M962 0 V1080" />
    </svg>
    <canvas id="appParticlesCanvas" class="orbital-particles"></canvas>
    <div class="scan-layer"></div>
  </div>

  <header class="corner-assistant" aria-label="ORBI assistant">
    <button class="orbi-node" id="orbiButton" type="button" aria-label="Відкрити помічника ORBI">
      <span class="orbi-avatar">
        <img src="../assets/icons/orbital/orbi.svg?v=49" alt="" />
      </span>
      <span class="orbi-copy">
        <strong>ORBI</strong>
        <small>AI ASSISTANT</small>
        <i></i>
      </span>
    </button>
  </header>

  <header class="corner-user">
    <button class="user-node" id="userMenuButton" type="button" aria-haspopup="dialog" aria-controls="profileModal">
      <span class="user-avatar" id="userAvatar">
        <img src="../assets/icons/orbital/user.svg?v=49" alt="" />
      </span>
      <span class="user-copy">
        <strong id="operatorName">Користувач</strong>
        <small>Рівень доступу: <b id="operatorRole">очікується</b></small>
      </span>
      <span class="user-chevron">⌄</span>
    </button>
  </header>

  <main class="orbital-shell" aria-label="BASTION tactical orbital interface">
    <section class="orbital-stage" aria-label="Головне меню BASTION">
      <div class="orbital-aura"></div>

      <svg class="orbital-svg" id="orbitalSvg" viewBox="0 0 1000 1000" role="img" aria-label="Секторне меню BASTION">
        <defs>
          <filter id="sectorGlow" x="-45%" y="-45%" width="190%" height="190%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>

          <linearGradient id="sectorFill" x1="0" x2="1">
            <stop offset="0%" stop-color="#120005" stop-opacity=".86" />
            <stop offset="58%" stop-color="#0b0610" stop-opacity=".66" />
            <stop offset="100%" stop-color="#030306" stop-opacity=".86" />
          </linearGradient>
        </defs>

        <g class="outer-radar" aria-hidden="true">
          <circle cx="500" cy="500" r="454" />
          <circle cx="500" cy="500" r="423" />
          <circle cx="500" cy="500" r="378" />
        </g>

        <g id="sectorPaths"></g>

        <g class="core-rings" aria-hidden="true">
          <circle cx="500" cy="500" r="176" />
          <circle cx="500" cy="500" r="142" />
          <circle cx="500" cy="500" r="108" />
        </g>
      </svg>

      <div class="module-labels" id="moduleLabels"></div>
      <div class="module-detail" id="moduleDetail" aria-live="polite"></div>

      <a class="core-node" href="./app.html" aria-label="BASTION CORE">
        <img src="../assets/logo/bastion-mark.svg?v=49" alt="" />
        <strong>BASTION</strong>
        <small>CORE SYSTEM</small>
        <span>● СИСТЕМА АКТИВНА</span>
      </a>
    </section>
  </main>

  <footer class="bottom-contact" aria-label="Контактна інформація">
    <a href="mailto:support@bastion.system">✉ support@bastion.system</a>
    <span>•</span>
    <a href="https://t.me/bastion_support">⌁ @bastion_support</a>
    <span>•</span>
    <a href="tel:+380970000000">☏ +38 (097) 000-00-00</a>
  </footer>

  <nav class="bottom-map" aria-label="Карта сайту">
    <span class="map-title">SITE MAP</span>
    <button class="map-dot is-active" type="button" data-target="core" title="BASTION Core"></button>
    <button class="map-dot" type="button" data-target="dicts" title="Довідники"></button>
    <button class="map-dot" type="button" data-target="upload" title="Завантаження"></button>
    <button class="map-dot" type="button" data-target="nodes" title="Зв’язки / Вузли"></button>
    <button class="map-dot" type="button" data-target="calculator" title="Калькулятор"></button>
    <button class="map-dot" type="button" data-target="analysis" title="Аналіз"></button>
    <button class="map-dot" type="button" data-target="command" title="Висновки"></button>
  </nav>

  <div class="profile-modal" id="profileModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="profileTitle">
    <div class="profile-backdrop" data-close-profile></div>
    <section class="profile-card">
      <button class="profile-close" type="button" data-close-profile aria-label="Закрити">×</button>
      <div class="profile-head">
        <span class="profile-avatar" id="profileAvatar">
          <img src="../assets/icons/orbital/user.svg?v=49" alt="" />
        </span>
        <div>
          <p>USER NODE</p>
          <h2 id="profileTitle">Профіль користувача</h2>
        </div>
      </div>
      <dl class="profile-data">
        <div><dt>Логін</dt><dd id="profileLogin">—</dd></div>
        <div><dt>Email</dt><dd id="profileEmail">—</dd></div>
        <div><dt>Рівень доступу</dt><dd id="profileRole">—</dd></div>
        <div><dt>Статус</dt><dd>ACTIVE / MFA VERIFIED</dd></div>
      </dl>
      <div class="profile-actions">
        <button type="button" class="ghost-btn">Редагувати аватар</button>
        <button type="button" class="danger-btn" id="logoutButton">Вийти з системи</button>
      </div>
    </section>
  </div>

  <script src="../scripts/config.js?v=49"></script>
  <script src="../scripts/auth.js?v=49"></script>
  <script src="../scripts/app-home.js?v=49"></script>
</body>
</html>
