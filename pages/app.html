<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTION CORE</title>
  <link rel="stylesheet" href="../styles/app.css">
</head>

<body>

  <div class="top-left-panel">
    <div class="orbi-avatar"></div>

    <div class="orbi-info">
      <h2>ORBI</h2>
      <span>AI ASSISTANT</span>
    </div>
  </div>

  <div class="top-right-panel">
    <div class="user-avatar"></div>

    <div class="user-info">
      <h2>lavash.squad</h2>
      <span>Рівень доступу: <b>DEMO</b></span>
    </div>

    <div class="user-arrow">˅</div>
  </div>

  <main class="main-stage">

    <div class="core-wrapper">

      <img
        class="core-ring"
        src="../assets/backgrounds/core-network-bg-v2.jpg"
        alt="CORE"
      >

      <div class="segment seg-01">
        <div class="seg-number">01</div>
        <div class="seg-icon">▤</div>
        <div class="seg-title">ДОВІДНИКИ</div>
      </div>

      <div class="segment seg-02">
        <div class="seg-number">02</div>
        <div class="seg-icon">⇪</div>
        <div class="seg-title">ЗАВАНТАЖЕННЯ</div>
      </div>

      <div class="segment seg-03">
        <div class="seg-number">03</div>
        <div class="seg-icon">⌘</div>
        <div class="seg-title">ЗВ'ЯЗКИ / ВУЗЛИ</div>
      </div>

      <div class="segment seg-04">
        <div class="seg-number">04</div>
        <div class="seg-icon">◎</div>
        <div class="seg-title">КАЛЬКУЛЯТОР</div>
      </div>

      <div class="segment seg-05">
        <div class="seg-number">05</div>
        <div class="seg-icon">▣</div>
        <div class="seg-title">АНАЛІЗ</div>
      </div>

      <div class="segment seg-06">
        <div class="seg-number">06</div>
        <div class="seg-icon">✦</div>
        <div class="seg-title">ВИСНОВКИ ДЛЯ КОМАНДИРА</div>
      </div>

      <div class="core-center">
        <img
          src="../assets/icons/bastion-logo.png"
          class="core-logo"
          alt="BASTION"
        >
      </div>

    </div>

  </main>

  <div class="bottom-left-panel">
    ✉ support@bastion.system
    &nbsp;&nbsp;•&nbsp;&nbsp;
    @bastion_support
    &nbsp;&nbsp;•&nbsp;&nbsp;
    ☏ +38 (097) 000-00-00
  </div>

  <div class="bottom-right-panel">
    SITE MAP

    <div class="dots">
      <span class="active"></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

</body>
</html>
