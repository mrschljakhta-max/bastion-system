<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BASTION — Core</title>
  <link rel="icon" type="image/svg+xml" href="../assets/logo/bastion-favicon.svg?v=117" />
  <link rel="stylesheet" href="../styles/app-home-v118.css?v=121" />
</head>
<body class="bastion-core-page" data-active-module="">
  <div class="core-background" aria-hidden="true">
    <div class="core-bg-image"></div>

    <svg class="circuit-traces" viewBox="0 0 1600 900" preserveAspectRatio="none">
      <defs>
        <linearGradient id="traceRed" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="rgba(255,40,32,0)" />
          <stop offset=".5" stop-color="rgba(255,95,70,.95)" />
          <stop offset="1" stop-color="rgba(255,40,32,0)" />
        </linearGradient>
      </defs>
      <g class="trace-base">
        <path d="M0 235 H250 L310 190 H520"/><path d="M1600 235 H1348 L1290 190 H1080"/>
        <path d="M0 500 H290 L360 454 H620"/><path d="M1600 500 H1300 L1232 454 H980"/>
        <path d="M0 672 H360 L420 718 H680"/><path d="M1600 672 H1240 L1180 718 H920"/>
      </g>
      <g class="trace-pulse">
        <path style="--d:.2s" d="M0 235 H250 L310 190 H520"/><path style="--d:1.1s" d="M1600 235 H1348 L1290 190 H1080"/>
        <path style="--d:2.0s" d="M0 500 H290 L360 454 H620"/><path style="--d:2.9s" d="M1600 500 H1300 L1232 454 H980"/>
        <path style="--d:3.7s" d="M0 672 H360 L420 718 H680"/><path style="--d:4.5s" d="M1600 672 H1240 L1180 718 H920"/>
      </g>
      <g class="trace-nodes">
        <circle cx="250" cy="235" r="3"/><circle cx="1348" cy="235" r="3"/>
        <circle cx="290" cy="500" r="3"/><circle cx="1300" cy="500" r="3"/>
        <circle cx="360" cy="672" r="3"/><circle cx="1240" cy="672" r="3"/>
      </g>
    </svg>

    <svg class="beam-layer" viewBox="0 0 1600 900" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <linearGradient id="beamGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="rgba(255,51,56,0)" />
          <stop offset="35%" stop-color="rgba(255,51,56,.12)" />
          <stop offset="50%" stop-color="rgba(255,120,120,.85)" />
          <stop offset="65%" stop-color="rgba(255,51,56,.12)" />
          <stop offset="100%" stop-color="rgba(255,51,56,0)" />
        </linearGradient>
      </defs>
      <path class="beam" d="M0 305 C 390 300, 470 420, 800 450 C 1130 480, 1210 300, 1600 305" />
      <path class="beam beam--soft" d="M0 594 C 390 600, 470 480, 800 450 C 1130 420, 1210 600, 1600 594" />
    </svg>

    <canvas id="particlesCanvas" class="particles-canvas" aria-hidden="true"></canvas>
    <div class="scanlines"></div>
  </div>

  <div class="b116-top-panels">
    <section class="b116-panel b116-panel--left">
      <img class="b116-panel__bg" src="../assets/ui/hud-panel-frame-v116.png?v=116" alt="" />
      <div class="b116-panel__avatar-box">
        <img class="b116-panel__avatar" src="../assets/ui/orbi-avatar-v116.png?v=116" alt="" />
      </div>
      <div class="b116-panel__text">
        <strong>ОРБІ</strong>
        <small>ПОМІЧНИК</small>
      </div>
    </section>

    <button id="userMenuButton" class="b116-panel b116-panel--right" type="button" aria-haspopup="dialog" aria-expanded="false">
      <img class="b116-panel__bg b116-panel__bg--mirror" src="../assets/ui/hud-panel-frame-v116.png?v=116" alt="" />
      <div class="b116-panel__avatar-box">
        <img id="userAvatarTop" class="b116-panel__avatar plate-avatar-user" src="../assets/ui/default-user-avatar-v105.png?v=116" alt="" />
      </div>
      <div class="b116-panel__text">
        <strong id="operatorName">lavash.squad</strong>
        <small>РІВЕНЬ ДОСТУПУ: <span id="operatorRole">DEMO</span></small>
        <strong id="plateOperatorName" class="b116-hidden-sync">lavash.squad</strong>
        <span id="plateOperatorRole" class="b116-hidden-sync">DEMO</span>
      </div>
    </button>
  </div>




  <main class="core-screen">
    <section class="orbital-menu" aria-label="BASTION main modules">
      <img class="mechanical-ring-underlay" src="../assets/backgrounds/app-ring-base-v63.png?v=87" alt="" />

      <div class="reactor-status"><span>CORE</span> <b>ONLINE</b><i></i></div>

      <svg class="orbital-svg" viewBox="0 0 1000 1000" aria-hidden="true">
        <defs>
          <radialGradient id="segmentFill" cx="50%" cy="45%" r="70%">
            <stop offset="0%" stop-color="rgba(255,75,58,.18)" />
            <stop offset="62%" stop-color="rgba(84,19,22,.45)" />
            <stop offset="100%" stop-color="rgba(15,7,9,.88)" />
          </radialGradient>
          <radialGradient id="sectorHotCore" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="rgba(255,80,50,.32)" />
            <stop offset="100%" stop-color="rgba(255,20,10,0)" />
          </radialGradient>
          <linearGradient id="metalSheen" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="rgba(255,255,255,.08)" />
            <stop offset=".5" stop-color="rgba(255,61,42,.08)" />
            <stop offset="1" stop-color="rgba(0,0,0,.05)" />
          </linearGradient>
          <filter id="hotGlow">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="redGlow">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <g class="rotating-rings">
          <circle cx="500" cy="500" r="236"></circle>
          <circle cx="500" cy="500" r="312"></circle>
          <circle cx="500" cy="500" r="454"></circle>
        </g>
        <g class="core-rings">
          <circle cx="500" cy="500" r="164"></circle>
          <circle cx="500" cy="500" r="190"></circle>
        </g>

        <g id="energyBeams" class="sector-beams"></g>
        <g id="sectorPaths"></g>
      </svg>

      <div id="moduleLabels" class="module-labels"></div>

      <a class="core-node" href="./app.html" aria-label="BASTION Core">
        <span class="core-node-shell">
          <img class="center-reactor-ring" src="../assets/backgrounds/app-center-reactor-v66.png?v=87" alt="" />
          <span class="center-reactor-glow"></span>
        </span>
        <img class="center-bastion-mark" src="../assets/icons/bastion-mark-v66.png?v=87" alt="BASTION" />
      </a>
    </section>
  </main>

  <footer class="bottom-contact hud-bottom-panel hud-bottom-left" aria-hidden="true">
    <div class="bottom-contact-panel" aria-hidden="true"></div>
    <div class="contact-dot-track" aria-hidden="true">
      <span class="contact-dot is-active"></span>
      <span class="contact-dot"></span>
      <span class="contact-dot"></span>
      <span class="contact-dot"></span>
      <span class="contact-dot"></span>
      <span class="contact-dot"></span>
      <span class="contact-dot"></span>
    </div>
  </footer>

  <nav class="bottom-map hud-bottom-panel hud-bottom-right" aria-label="Site map" aria-hidden="true">
    <div class="bottom-map-panel" aria-hidden="true"></div>
    <div class="sitemap-track">
      <button class="map-dot is-active" data-target="core" data-page-title="00 — Основне меню" aria-label="Основне меню"></button>
      <button class="map-dot" data-target="dicts" data-page-title="01 — Довідники" aria-label="Довідники"></button>
      <button class="map-dot" data-target="nodes" data-page-title="02 — Зв’язки" aria-label="Зв’язки"></button>
      <button class="map-dot" data-target="upload" data-page-title="03 — Завантаження" aria-label="Завантаження"></button>
      <button class="map-dot" data-target="calculator" data-page-title="04 — Калькулятор" aria-label="Калькулятор"></button>
      <button class="map-dot" data-target="analysis" data-page-title="05 — Аналіз" aria-label="Аналіз"></button>
      <button class="map-dot" data-target="command" data-page-title="06 — Висновки" aria-label="Висновки"></button>
    </div>
  </nav>

  <aside id="floatingDetail" class="floating-detail" aria-hidden="true"></aside>
  <div id="profileModal" class="profile-modal bastion-profile-modal" aria-hidden="true">
    <div class="profile-backdrop" data-close-profile></div>
    <section class="profile-card profile-command-card" role="dialog" aria-modal="true" aria-label="Профіль користувача">
      <button class="profile-close" type="button" data-close-profile aria-label="Закрити">×</button>

      <div class="profile-card__left">
        <div class="profile-honeycomb" aria-hidden="true"></div>
        <div class="profile-avatar-core">
          <img id="userAvatarModal" src="../assets/ui/default-user-avatar-v105.png?v=177" alt="" />
        </div>
        <div class="profile-core-caption">
          <span>BASTION ID</span>
          <strong id="profileStatus">ACTIVE</strong>
        </div>
      </div>

      <div class="profile-card__right">
        <div class="profile-topline">
          <span>USER COMMAND MODULE</span>
          <i></i>
        </div>

        <header class="profile-title-block">
          <p>ПРОФІЛЬ КОРИСТУВАЧА</p>
          <h2 id="profileLogin">lavash.squad</h2>
        </header>

        <dl class="profile-data">
          <div>
            <dt>Логін</dt>
            <dd id="profileLoginValue">lavash.squad</dd>
          </div>
          <div>
            <dt>Email</dt>
            <dd id="profileEmail">email не визначено</dd>
          </div>
          <div>
            <dt>Рівень доступу</dt>
            <dd id="profileRole">DEMO</dd>
          </div>
          <div>
            <dt>Сесія</dt>
            <dd id="profileSession">Захищена</dd>
          </div>
        </dl>

        <div class="profile-actions profile-actions--single">
          <button id="logoutButton" class="danger-btn profile-logout-btn" type="button">Вийти із сайту</button>
        </div>
      </div>
    </section>
  </div>


  <script src="../scripts/config.js?v=177"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../scripts/supabase-client.js?v=177"></script>
  <script src="../scripts/app-auth-guard.js?v=106"></script>
  <script src="../scripts/app-home-v118.js?v=118"></script>
  <script src="../scripts/profile-panel.js?v=121"></script>
</body>
</html>
