<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BASTION — Довідники</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="../assets/logo/bastion-favicon.svg?v=117" />
  <link rel="stylesheet" href="../styles/app-home-v118.css?v=161" />
  <link rel="stylesheet" href="../styles/dicts.css?v=170" />
</head>
<body class="bastion-core-page dicts-page" data-active-module="dicts">
  <div class="core-background" aria-hidden="true">
    <div class="core-bg-image"></div>

    <svg class="circuit-traces" viewBox="0 0 1600 900" preserveAspectRatio="none">
      <defs>
        <linearGradient id="traceRed" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="rgba(255,40,32,0)" />
          <stop offset=".5" stop-color="rgba(255,95,70,.95)" />
          <stop offset="1" stop-color="rgba(255,40,32,0)" />
        </linearGradient>
      </defs>
      <g class="trace-base">
        <path d="M0 235 H250 L310 190 H520"/><path d="M1600 235 H1348 L1290 190 H1080"/>
        <path d="M0 500 H290 L360 454 H620"/><path d="M1600 500 H1300 L1232 454 H980"/>
        <path d="M0 672 H360 L420 718 H680"/><path d="M1600 672 H1240 L1180 718 H920"/>
      </g>
      <g class="trace-pulse">
        <path style="--d:.2s" d="M0 235 H250 L310 190 H520"/><path style="--d:1.1s" d="M1600 235 H1348 L1290 190 H1080"/>
        <path style="--d:2.0s" d="M0 500 H290 L360 454 H620"/><path style="--d:2.9s" d="M1600 500 H1300 L1232 454 H980"/>
        <path style="--d:3.7s" d="M0 672 H360 L420 718 H680"/><path style="--d:4.5s" d="M1600 672 H1240 L1180 718 H920"/>
      </g>
      <g class="trace-nodes">
        <circle cx="250" cy="235" r="3"/><circle cx="1348" cy="235" r="3"/>
        <circle cx="290" cy="500" r="3"/><circle cx="1300" cy="500" r="3"/>
        <circle cx="360" cy="672" r="3"/><circle cx="1240" cy="672" r="3"/>
      </g>
    </svg>

    <svg class="beam-layer" viewBox="0 0 1600 900" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <linearGradient id="beamGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="rgba(255,51,56,0)" />
          <stop offset="35%" stop-color="rgba(255,51,56,.12)" />
          <stop offset="50%" stop-color="rgba(255,120,120,.85)" />
          <stop offset="65%" stop-color="rgba(255,51,56,.12)" />
          <stop offset="100%" stop-color="rgba(255,51,56,0)" />
        </linearGradient>
      </defs>
      <path class="beam" d="M0 305 C 390 300, 470 420, 800 450 C 1130 480, 1210 300, 1600 305" />
      <path class="beam beam--soft" d="M0 594 C 390 600, 470 480, 800 450 C 1130 420, 1210 600, 1600 594" />
    </svg>

    <canvas id="particlesCanvas" class="particles-canvas" aria-hidden="true"></canvas>
    <div class="scanlines"></div>
  </div>

  <div class="b116-top-panels">
    <section class="b116-panel b116-panel--left">
      <img class="b116-panel__bg" src="../assets/ui/hud-panel-frame-v116.png?v=116" alt="" />
      <div class="b116-panel__avatar-box">
        <img class="b116-panel__avatar" src="../assets/ui/orbi-avatar-v116.png?v=116" alt="" />
      </div>
      <div class="b116-panel__text">
        <strong>ОРБІ</strong>
        <small>ПОМІЧНИК</small>
      </div>
    </section>

    <button id="userMenuButton" class="b116-panel b116-panel--right" type="button" aria-haspopup="dialog" aria-expanded="false">
      <img class="b116-panel__bg b116-panel__bg--mirror" src="../assets/ui/hud-panel-frame-v116.png?v=116" alt="" />
      <div class="b116-panel__avatar-box">
        <img id="userAvatarTop" class="b116-panel__avatar plate-avatar-user" src="../assets/ui/default-user-avatar-v105.png?v=116" alt="" />
      </div>
      <div class="b116-panel__text">
        <strong id="operatorName">lavash.squad</strong>
        <small>РІВЕНЬ ДОСТУПУ: <span id="operatorRole">DEMO</span></small>
        <strong id="plateOperatorName" class="b116-hidden-sync">lavash.squad</strong>
        <span id="plateOperatorRole" class="b116-hidden-sync">DEMO</span>
      </div>
    </button>
  </div>

  <main class="dicts-holo-stage" aria-label="Довідники">
    <section class="dicts-carousel-wrap" aria-label="Карусель довідників">
      <button class="dicts-arrow dicts-arrow--left" type="button" aria-label="Попередній довідник">‹</button>
      <div class="dicts-carousel" id="dictsCarousel" aria-live="polite">
        <button class="dict-folder" type="button" data-key="projectiles" data-table="dict_projectiles"><span class="dict-folder__inner"><b class="dict-folder__title">СНАРЯДИ</b><i class="dict-folder__count">0 записів</i></span></button>
        <button class="dict-folder" type="button" data-key="charges" data-table="dict_charges"><span class="dict-folder__inner"><b class="dict-folder__title">ЗАРЯДИ</b><i class="dict-folder__count">0 записів</i></span></button>
        <button class="dict-folder" type="button" data-key="fuzes" data-table="dict_fuzes"><span class="dict-folder__inner"><b class="dict-folder__title">ПІДРИВНИКИ</b><i class="dict-folder__count">0 записів</i></span></button>
        <button class="dict-folder" type="button" data-key="units" data-table="dict_units"><span class="dict-folder__inner"><b class="dict-folder__title">ПІДРОЗДІЛИ</b><i class="dict-folder__count">0 записів</i></span></button>
        <button class="dict-folder dict-folder--add" type="button" data-action="add-dict"><span class="dict-folder__inner"><b class="dict-folder__title">+ ДОДАТИ</b><i class="dict-folder__count">довідник</i></span></button>
      </div>
      <button class="dicts-arrow dicts-arrow--right" type="button" aria-label="Наступний довідник">›</button>
    </section>

    <section class="dicts-projector-wrap" aria-hidden="true">
      <div class="dicts-light-cone"></div>
      <div class="dicts-light-core"></div>
      <img class="dicts-projector" src="../assets/ui/dicts-projector.png?v=166" alt="" />
    </section>
  </main>

  <footer class="bottom-contact hud-bottom-panel hud-bottom-left" aria-hidden="true">
    <div class="bottom-contact-panel" aria-hidden="true"></div>
    <div class="contact-dot-track" aria-hidden="true">
      <span class="contact-dot is-active"></span><span class="contact-dot"></span><span class="contact-dot"></span><span class="contact-dot"></span><span class="contact-dot"></span><span class="contact-dot"></span><span class="contact-dot"></span>
    </div>
  </footer>

  <nav class="bottom-map hud-bottom-panel hud-bottom-right" aria-label="Site map" aria-hidden="true">
    <div class="bottom-map-panel" aria-hidden="true"></div>
    <div class="sitemap-track">
      <button class="map-dot" data-target="core" data-page-title="00 — Основне меню" aria-label="Основне меню"></button>
      <button class="map-dot is-active" data-target="dicts" data-page-title="01 — Довідники" aria-label="Довідники"></button>
      <button class="map-dot" data-target="nodes" data-page-title="02 — Зв’язки" aria-label="Зв’язки"></button>
      <button class="map-dot" data-target="upload" data-page-title="03 — Завантаження" aria-label="Завантаження"></button>
      <button class="map-dot" data-target="calculator" data-page-title="04 — Калькулятор" aria-label="Калькулятор"></button>
      <button class="map-dot" data-target="analysis" data-page-title="05 — Аналіз" aria-label="Аналіз"></button>
      <button class="map-dot" data-target="command" data-page-title="06 — Висновки" aria-label="Висновки"></button>
    </div>
  </nav>



  <div id="dictCreateModal" class="dict-modal" aria-hidden="true">
    <div class="dict-modal__backdrop" data-close-dict-modal></div>
    <section class="dict-modal__panel" role="dialog" aria-modal="true" aria-labelledby="dictCreateTitle">
      <button class="dict-modal__close" type="button" data-close-dict-modal aria-label="Закрити">×</button>
      <h2 id="dictCreateTitle">ДОДАТИ ДОВІДНИК</h2>
      <p class="dict-modal__lead">Створює новий довідник у реєстрі та окрему таблицю Supabase для його записів.</p>

      <form id="dictCreateForm" class="dict-form">
        <label class="dict-field">
          <span>Назва довідника</span>
          <input id="dictTitleInput" name="title" type="text" autocomplete="off" placeholder="Наприклад: Снаряди" required />
        </label>

        <div class="dict-columns-head">
          <span>Колонки довідника</span>
          <button id="addDictColumnBtn" class="dict-mini-button" type="button">+ КОЛОНКА</button>
        </div>

        <div id="dictColumnsList" class="dict-columns-list" aria-label="Колонки нового довідника">
          <div class="dict-column-row">
            <input type="text" value="name" data-column-name required />
            <select data-column-type>
              <option value="text">Текст</option>
              <option value="integer">Ціле число</option>
              <option value="numeric">Число</option>
              <option value="date">Дата</option>
              <option value="boolean">Так / Ні</option>
            </select>
            <button type="button" class="dict-remove-column" aria-label="Прибрати колонку">×</button>
          </div>
          <div class="dict-column-row">
            <input type="text" value="alias" data-column-name required />
            <select data-column-type>
              <option value="text">Текст</option>
              <option value="integer">Ціле число</option>
              <option value="numeric">Число</option>
              <option value="date">Дата</option>
              <option value="boolean">Так / Ні</option>
            </select>
            <button type="button" class="dict-remove-column" aria-label="Прибрати колонку">×</button>
          </div>
        </div>

        <p id="dictCreateStatus" class="dict-create-status" role="status"></p>

        <div class="dict-modal__actions">
          <button class="dict-action dict-action--ghost" type="button" data-close-dict-modal>СКАСУВАТИ</button>
          <button class="dict-action dict-action--primary" type="submit">СТВОРИТИ</button>
        </div>
      </form>
    </section>
  </div>

  <div id="dictManageModal" class="dict-modal dict-modal--wide" aria-hidden="true">
    <div class="dict-modal__backdrop" data-close-manage-modal></div>
    <section class="dict-modal__panel dict-modal__panel--wide dict-view-panel" role="dialog" aria-modal="true" aria-labelledby="dictManageTitle">
      <button class="dict-modal__close" type="button" data-close-manage-modal aria-label="Закрити">×</button>

      <header class="dict-view-head">
        <div class="dict-view-titlebox">
          <h2 id="dictManageTitle">ДОВІДНИК</h2>
          <p id="dictManageLead" class="dict-modal__lead">0 записів</p>
        </div>
        <div class="dict-view-tools" aria-label="Дії з довідником">
          <button id="dictEditToggleBtn" class="dict-icon-button" type="button" title="Редагувати довідник" aria-label="Редагувати довідник">✎</button>
          <button id="dictSortToggleBtn" class="dict-icon-button" type="button" title="Сортування і пошук" aria-label="Сортування і пошук">⇅</button>
          <button id="dictDeleteBtn" class="dict-icon-button dict-icon-button--danger" type="button" title="Видалити довідник" aria-label="Видалити довідник">🗑</button>
        </div>
      </header>

      <section id="dictEditPanel" class="dict-edit-panel" hidden>
        <div class="dict-edit-grid">
          <div class="dict-manager-card">
            <h3>Параметри довідника</h3>
            <label class="dict-field">
              <span>Назва довідника</span>
              <input id="dictManageNameInput" type="text" autocomplete="off" />
            </label>
            <div class="dict-manager-actions">
              <button id="dictSaveTitleBtn" class="dict-action dict-action--primary" type="button">ЗБЕРЕГТИ НАЗВУ</button>
            </div>
          </div>

          <div class="dict-manager-card">
            <h3>Колонки</h3>
            <div id="dictColumnsManager" class="dict-columns-manager"></div>
            <div class="dict-add-column-inline">
              <input id="dictNewColumnName" type="text" placeholder="Нова колонка, наприклад: caliber" />
              <select id="dictNewColumnType">
                <option value="text">Текст</option>
                <option value="integer">Ціле число</option>
                <option value="numeric">Число</option>
                <option value="date">Дата</option>
                <option value="boolean">Так / Ні</option>
              </select>
              <button id="dictAddColumnManageBtn" class="dict-mini-button" type="button">+ ДОДАТИ</button>
            </div>
          </div>
        </div>
      </section>

      <section id="dictSortPanel" class="dict-sort-panel" hidden>
        <input id="dictSearchInput" type="search" placeholder="Пошук по всіх текстових колонках..." />
        <select id="dictSortSelect">
          <option value="name_asc">Назва: А → Я</option>
          <option value="name_desc">Назва: Я → А</option>
          <option value="created_desc">Нові зверху</option>
        </select>
        <button id="dictReloadRowsBtn" class="dict-mini-button" type="button">ОНОВИТИ</button>
      </section>

      <section class="dict-records-card dict-records-card--clean">
        <div class="dict-table-wrap dict-table-wrap--clean">
          <table id="dictRecordsTable" class="dict-records-table dict-records-table--clean"></table>
        </div>
        <div class="dict-add-row-line">
          <button id="dictAddRowBtn" class="dict-floating-plus" type="button" title="Додати запис" aria-label="Додати запис">+</button>
        </div>
      </section>

      <p id="dictManageStatus" class="dict-create-status" role="status"></p>
    </section>
  </div>


  <aside id="floatingDetail" class="floating-detail" aria-hidden="true"></aside>
  <script src="../scripts/config.js?v=170"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../scripts/dicts.js?v=170"></script>
</body>
</html>
