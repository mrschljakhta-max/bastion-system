<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BASTION — Налаштування доступу</title>
  <link rel="icon" href="./assets/logo/bastion-favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./styles/fonts.css" />
  <link rel="stylesheet" href="./styles/theme.css" />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/setup-account.css?v=1" />
</head>
<body class="setup-body">
  <main class="setup-shell">
    <section class="setup-card" id="setupCard">
      <div class="setup-brand">
        <img src="./assets/logo/bastion-mark.svg" alt="BASTION" />
        <div>
          <p>BASTION ACCESS</p>
          <h1>Перше налаштування</h1>
        </div>
      </div>

      <div class="setup-status" id="setupStatus">Перевіряю запрошення…</div>

      <form class="setup-form" id="setupForm" hidden>
        <label>
          <span>Email</span>
          <input id="setupEmail" type="email" readonly />
        </label>

        <label>
          <span>Роль</span>
          <input id="setupRole" type="text" readonly />
        </label>

        <label>
          <span>Створіть пароль</span>
          <input id="setupPassword" type="password" autocomplete="new-password" placeholder="Мінімум 8 символів" />
        </label>

        <button type="submit" id="setupSubmit">Створити акаунт і показати QR</button>
      </form>

      <section class="setup-mfa" id="setupMfa" hidden>
        <h2>Підключіть Google Authenticator</h2>
        <div class="setup-qr-frame">
          <img id="setupQr" alt="QR-код 2FA" />
        </div>
        <p id="setupSecret" class="setup-secret"></p>
        <label>
          <span>Код з Authenticator</span>
          <input id="setupCode" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="000000" />
        </label>
        <button type="button" id="setupVerify">Підтвердити 2FA</button>
      </section>

      <a class="setup-link" href="./index.html">Повернутися на стартову сторінку</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./scripts/config.js?v=28"></script>
  <script src="./scripts/auth.js?v=28"></script>
  <script src="./scripts/access.js?v=1"></script>
  <script src="./scripts/setup-account.js?v=1"></script>
</body>
</html>
