<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>BASTION — Створення акаунта</title>

  <link rel="icon" type="image/svg+xml" href="./assets/logo/bastion-favicon.svg?v=31" />
  <link rel="shortcut icon" href="./assets/logo/bastion-favicon.svg?v=31" />

  <link rel="stylesheet" href="./styles/setup-account-v31.css?v=31" />
</head>

<body class="setup-page">

  <main class="setup-shell">

    <section class="setup-brand-zone" aria-label="BASTION">
      <img
        src="./assets/logo/bastion-glyph-wordmark.svg?v=31"
        alt="BASTION"
        class="setup-logo"
      />
    </section>

    <section class="setup-panel-zone">

      <div class="setup-card">

        <div class="setup-card-head">
          <div>
            <div class="setup-card-kicker">ACCESS NODE</div>
            <h1>СТВОРЕННЯ АКАУНТА</h1>
          </div>

          <div class="secure-badge">
            <span></span>
            Захищено
          </div>
        </div>

        <div class="setup-alert">
          <span class="alert-icon">▣</span>
          <p>
            Створіть логін і пароль для вашого акаунта.
            Використовуйте комбінацію літер і цифр.
          </p>
        </div>

        <form id="setup-account-form" class="setup-form">

          <div class="field">
            <label for="login">ЛОГІН</label>
            <div class="input-wrap">
              <span class="input-icon">♙</span>
              <input
                id="login"
                name="login"
                type="text"
                placeholder="Введіть логін"
                autocomplete="username"
              />
            </div>
          </div>

          <div class="field">
            <label for="password">ПАРОЛЬ</label>
            <div class="input-wrap">
              <span class="input-icon">♢</span>
              <input
                id="password"
                name="password"
                type="password"
                placeholder="Введіть пароль"
                autocomplete="new-password"
              />
              <button
                class="password-toggle"
                type="button"
                data-target="password"
                aria-label="Показати пароль"
              >⊘</button>
            </div>
          </div>

          <div class="rules">
            <span id="ruleLength">◎ Мін. 8 символів</span>
            <span id="ruleLetter">◎ Літера</span>
            <span id="ruleDigit">◎ Цифра</span>
            <span id="ruleSaved">◎ Паролі зберігаються</span>
          </div>

          <button class="submit-btn" type="submit">
            АКТИВУВАТИ ДОСТУП
            <span>→</span>
          </button>

          <p class="setup-note">
            Ваш доступ буде активовано після успішного створення логіна і пароля.
          </p>

        </form>

      </div>

    </section>

  </main>

  <script src="./scripts/config.js?v=31"></script>
  <script src="./scripts/auth.js?v=31"></script>
  <script src="./scripts/access.js?v=31"></script>
  <script src="./scripts/setup-account.js?v=31"></script>
</body>
</html>
