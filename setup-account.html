<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTION — Setup Account</title>

  <link rel="stylesheet" href="./styles/setup-account.css">
</head>

<body class="setup-account-page">

  <div class="setup-bg-layer"></div>

  <div class="setup-shell">

    <section class="setup-left">
      <div class="left-content">
        <div class="eyebrow">ПЕРША РЕЄСТРАЦІЯ</div>

        <h1>
          НАЛАШТУВАННЯ
          <span>ОБЛІКОВОГО ЗАПИСУ</span>
        </h1>

        <p>
          Ви отримали персональне запрошення для доступу до системи
          <strong>BASTION</strong>.
        </p>
      </div>
    </section>

    <section class="setup-right">

      <div class="setup-card">
        <div class="card-inner">

          <div class="access-node">ACCESS NODE</div>

          <h2>СТВОРЕННЯ ПАРОЛЯ</h2>

          <div class="setup-message">
            Створіть надійний пароль для вашого акаунта.
          </div>

          <div class="field">
            <label>НОВИЙ ПАРОЛЬ</label>
            <input type="password" placeholder="Введіть пароль">
          </div>

          <button class="activate-btn">
            АКТИВУВАТИ ДОСТУП
          </button>

        </div>
      </div>

    </section>

  </div>

</body>
</html>
