<body class="admin-start-body admin-login-body">
  <main class="admin-start-screen" aria-label="BASTION admin login">
    <div class="admin-bg" aria-hidden="true"></div>
    <div class="admin-vignette" aria-hidden="true"></div>
    <div class="admin-noise" aria-hidden="true"></div>

    <section class="admin-login-panel">
      <img class="admin-login-logo" src="../assets/logo/bastion-mark.svg" alt="BASTION" />
      <p class="admin-login-kicker">CONTROL NODE</p>
      <h1>ADMIN ACCESS</h1>
      <p class="admin-login-muted">Введіть логін і пароль адміністратора.</p>

      <form id="adminLoginForm" class="admin-login-form">
        <label>
          <span>Логін</span>
          <input id="adminLogin" type="text" autocomplete="username" required placeholder="admin" />
        </label>

        <label>
          <span>Пароль</span>
          <div class="admin-password-control">
            <input id="adminPassword" type="password" autocomplete="current-password" required placeholder="••••••••••••" />
            <button id="adminPasswordToggle" class="admin-password-toggle" type="button" aria-label="Показати пароль" title="Показати пароль">👁</button>
          </div>
        </label>

        <button id="adminLoginSubmit" type="submit">УВІЙТИ</button>
        <a class="admin-back-link" href="./start.html?v=5">← назад</a>
      </form>

      <div id="adminLoginStatus" class="admin-login-status" hidden></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../scripts/config.js?v=28"></script>
  <script src="./scripts/admin-login.js?v=122"></script>
</body>
</html>
